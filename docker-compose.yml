# ─────────────────────────────────────────────────────────────────────────────
# QOpz.AI — docker-compose
# Uso: docker compose up --build
# Accesso: http://localhost  (utente: opz, password: NGINX_PASSWORD)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── IB Gateway (headless, auto-login via env) ──────────────────────────────
  # Porta interna 4002 = paper | 4001 = live (auto-detect dal connection manager)
  # Credenziali: IBKR_USERNAME e IBKR_PASSWORD nel file .env sulla VM
  ibg:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    environment:
      - TWS_USERID=${IBKR_USERNAME:?Imposta IBKR_USERNAME nel .env}
      - TWS_PASSWORD=${IBKR_PASSWORD:?Imposta IBKR_PASSWORD nel .env}
      - TRADING_MODE=${IBKR_TRADING_MODE:-paper}
      - TWS_SETTINGS_PATH=/home/ibgateway/settings
      - READ_ONLY_API=no
      - EXISTING_SESSION_DETECTED_ACTION=primary
    volumes:
      - ./data/ibg-settings:/home/ibgateway/settings
    networks:
      - qopz-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'cat < /dev/null > /dev/tcp/127.0.0.1/4004 || cat < /dev/null > /dev/tcp/127.0.0.1/4002 || cat < /dev/null > /dev/tcp/127.0.0.1/4001'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8765"
    environment:
      - OPZ_PROFILE=${OPZ_PROFILE:-paper}
      - OPZ_DATA_MODE=${OPZ_DATA_MODE:-VENDOR_REAL_CHAIN}
      - IBKR_HOST=ibg          # punta al container IBG sulla qopz-net
      - IBKR_PORT=4004         # socat bridge della imagem IBG
      - IBKR_PORTS=4004,4002,7497,7496,4001
      - IBKR_ACCOUNT_TIMEOUT_SEC=5
    volumes:
      - qopz-db:/app/db
      - qopz-logs:/app/logs
      - ./data:/app/data
      - ./ops:/app/ops
    networks:
      - qopz-net
    depends_on:
      ibg:
        condition: service_started   # non blocca: API degrada gracefully se IBG non è pronto
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - NGINX_USER=${NGINX_USER:-opz}
      - NGINX_PASSWORD=${NGINX_PASSWORD:?Set NGINX_PASSWORD in .env}
    networks:
      - qopz-net
    restart: unless-stopped

volumes:
  qopz-db:
  qopz-logs:

networks:
  qopz-net:
    driver: bridge
