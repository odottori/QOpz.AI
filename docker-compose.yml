# ─────────────────────────────────────────────────────────────────────────────
# QOpz.AI — docker-compose
# Uso: docker compose up --build
# Accesso: http://localhost  (utente: opz, password: NGINX_PASSWORD)
# ─────────────────────────────────────────────────────────────────────────────

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8765"
    environment:
      - OPZ_PROFILE=${OPZ_PROFILE:-paper}
      - OPZ_DATA_MODE=${OPZ_DATA_MODE:-VENDOR_REAL_CHAIN}
    volumes:
      - qopz-db:/app/db
      - qopz-logs:/app/logs
      - ./ops:/app/ops
    networks:
      - qopz-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - NGINX_USER=${NGINX_USER:-opz}
      - NGINX_PASSWORD=${NGINX_PASSWORD:?Set NGINX_PASSWORD in .env}
    networks:
      - qopz-net
    restart: unless-stopped

volumes:
  qopz-db:
  qopz-logs:

networks:
  qopz-net:
    driver: bridge
