# ─────────────────────────────────────────────────────────────────────────────
# QOpz.AI — docker-compose per test locale
# Uso: docker compose up --build
# API disponibile su http://localhost:8765
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build: .
    ports:
      - "8765:8765"
    environment:
      - OPZ_PROFILE=dev
      - OPZ_API_TOKEN=${OPZ_API_TOKEN:-}
    volumes:
      - ./db:/app/db       # DuckDB persistente
      - ./logs:/app/logs   # Log operativi
      - ./ops:/app/ops     # Kill switch
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
