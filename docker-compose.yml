# ─────────────────────────────────────────────────────────────────────────────
# QOpz.AI — docker-compose
# Uso: docker compose up --build
# Accesso: http://localhost  (utente: opz, password: NGINX_PASSWORD)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── IB Gateway (headless, auto-login via env) ──────────────────────────────
  # Porta interna 4002 = paper | 4001 = live (auto-detect dal connection manager)
  # Credenziali: IBKR_USERNAME e IBKR_PASSWORD nel file .env sulla VM
  ibg:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    environment:
      - TWS_USERID=${IBKR_USERNAME:?Imposta IBKR_USERNAME nel .env}
      - TWS_PASSWORD=${IBKR_PASSWORD:?Imposta IBKR_PASSWORD nel .env}
      - TRADING_MODE=${IBKR_TRADING_MODE:-paper}
      - TWS_SETTINGS_PATH=/home/ibgateway/settings
      - READ_ONLY_API=no
      - EXISTING_SESSION_DETECTED_ACTION=primary
    # Entrypoint wrapper: rimuove launcher*.log non-scrivibili (owned da UID diverso)
    # prima di avviare IBG. Necessario perché la directory viene inizializzata dal
    # host user (UID 999) mentre il container gira come ibgateway (UID 1000).
    # ibgateway può fare rm su file altrui in una directory world-writable (no sticky bit).
    entrypoint:
      - /bin/bash
      - -c
      - |
        find "${TWS_SETTINGS_PATH:-/home/ibgateway/settings}" \
          -maxdepth 1 -name "launcher*.log" ! -writable -delete 2>/dev/null || true
        exec /home/ibgateway/scripts/run.sh
    volumes:
      - ./data/ibg-settings:/home/ibgateway/settings
    networks:
      - qopz-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'cat < /dev/null > /dev/tcp/127.0.0.1/4004 || cat < /dev/null > /dev/tcp/127.0.0.1/4002 || cat < /dev/null > /dev/tcp/127.0.0.1/4001'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8765"
    environment:
      - OPZ_PROFILE=${OPZ_PROFILE:-paper}
      - OPZ_DATA_MODE=${OPZ_DATA_MODE:-VENDOR_REAL_CHAIN}
      - CONTROL_API_BASE=http://control-plane:8770
      - CONTROL_API_TOKEN=${CONTROL_API_TOKEN:-qopz-control-local}
      - IBKR_HOST=ibg          # punta al container IBG sulla qopz-net
      - IBKR_PORT=4004         # socat bridge della imagem IBG
      - IBKR_PORTS=4004,4002,7497,7496,4001
      - IBKR_ACCOUNT_TIMEOUT_SEC=5
    volumes:
      - qopz-db:/app/db
      - qopz-logs:/app/logs
      - ./data:/app/data
      - ./ops:/app/ops
    networks:
      - qopz-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "api.control_plane:app", "--host", "0.0.0.0", "--port", "8770", "--workers", "1", "--log-level", "info"]
    environment:
      - CONTROL_API_TOKEN=${CONTROL_API_TOKEN:-qopz-control-local}
      - CONTROL_COMPOSE_PROJECT=${COMPOSE_PROJECT_NAME:-qopz}
      - CONTROL_IBWR_SERVICE=ibg
      - CONTROL_EVENTS_PATH=/app/data/control/ibwr_events.jsonl
      - CONTROL_STATE_PATH=/app/data/control/ibwr_state.json
      - DOCKER_SOCK_PATH=/var/run/docker.sock
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - qopz-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8770/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  tg-bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "scripts/telegram_command_bot.py"]
    environment:
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
      - TG_CHAT_ID=${TG_CHAT_ID:-}
      - TG_CHAT_IDS=${TG_CHAT_IDS:-}
      - TG_COMMAND_API_BASE=http://api:8765
      - TG_POLL_TIMEOUT_SEC=30
      - TG_POLL_SLEEP_SEC=1.0
      - TG_OFFSET_PATH=/app/data/telegram/offset.txt
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    networks:
      - qopz-net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - NGINX_USER=${NGINX_USER:-opz}
      - NGINX_PASSWORD=${NGINX_PASSWORD:?Set NGINX_PASSWORD in .env}
    networks:
      - qopz-net
    restart: unless-stopped

volumes:
  qopz-db:
  qopz-logs:

networks:
  qopz-net:
    driver: bridge
