# ─────────────────────────────────────────────────────────────────────────────
# QOpz.AI — docker-compose
# Uso: docker compose up --build
# API:   http://localhost:8765
# Guide: http://localhost:8766
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    environment:
      - OPZ_PROFILE=dev
      - OPZ_API_TOKEN=${OPZ_API_TOKEN:-}
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
      - ./ops:/app/ops
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  guide:
    build:
      context: .
      dockerfile: Dockerfile.guide
    ports:
      - "8766:80"
    restart: unless-stopped
