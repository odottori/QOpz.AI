# =============================================================================
# PAPER profile — IBKR paper trading account, real market data, no Kelly sizing
# Use: python validator.py --profile paper --config config/paper.toml
# Prerequisites: TWS or IBG running, paper account logged in, port 7496 open
# Kelly: DISABLED (requires DATA_MODE=VENDOR_REAL_CHAIN AND N_closed_trades>=50)
# =============================================================================

[phase0]
requirements_lock = "requirements.lock"
ibkr_timeout_sec  = 10       # seconds to wait for IBKR API connection (validator check)
md_timeout_sec    = 10       # seconds to wait for market-data response
md_symbol         = "SPY"    # reference symbol used in phase-0 market-data check
md_exchange       = "SMART"
md_currency       = "USD"
md_right          = "P"      # P = Put, C = Call
md_dte_min        = 30       # min days-to-expiry for option filter
md_dte_max        = 60       # max days-to-expiry for option filter

[storage]
duckdb_path        = "db/quantoptionai.duckdb"
parquet_convention = "asof_ts=YYYY-MM-DDTHH:MM:SSZ"

[dataset]
seed = 42
mode = "paper"     # DATA_MODE watermark: paper trading mode

[broker]
# port 7496 = paper (default IBKR paper port); port 7497 = live TWS
host      = "127.0.0.1"
port      = 7496        # PAPER port — no real money, simulated execution
client_id = 7           # must be unique per connected client

[ops]
log_dir          = "logs"
log_rotation_days = 7

[ops.kill_switch]
manual_trigger_file = "ops/kill_switch.trigger"

[secrets]
required_env = []

[tier]
# capital_tier = ceiling of available strategies (determined by deposited capital)
# active_mode  = currently selected operating mode (must be <= capital_tier)
capital_tier = "SMALL"
active_mode  = "MICRO"

[sessions]
# Sessioni automatiche morning + EOD — attive in paper trading
enabled          = true
morning_time     = "09:00"           # orario locale EST (America/New_York)
morning_post_open_enabled = true
morning_post_open_time    = "10:30"  # +1h da apertura cash USA (09:30 ET)
eod_time         = "16:30"           # orario locale EST
timezone         = "America/New_York"
duration_max_min = 10                # timeout massimo per sessione (minuti)
skip_weekends    = true
skip_holidays    = true              # calendario NYSE
profile          = "paper"
api_base         = "http://localhost:8765"
