# =============================================================================
# DEV profile — local development, no real broker, synthetic data
# Use: python validator.py --profile dev --config config/dev.toml
#      python scripts/planner_status.py
# =============================================================================

[phase0]
requirements_lock = "requirements.lock"
ibkr_timeout_sec  = 30       # seconds to wait for IBKR API connection (validator check)
md_timeout_sec    = 30       # seconds to wait for market-data response
md_symbol         = "SPY"    # reference symbol used in phase-0 market-data check
md_exchange       = "SMART"
md_currency       = "USD"
md_right          = "P"      # P = Put, C = Call
md_dte_min        = 30       # min days-to-expiry for option filter
md_dte_max        = 60       # max days-to-expiry for option filter

[storage]
duckdb_path        = "db/quantoptionai.duckdb"
parquet_convention = "asof_ts=YYYY-MM-DDTHH:MM:SSZ"   # timestamp column naming convention

[dataset]
seed = 42           # RNG seed for reproducibility
mode = "synthetic"  # DATA_MODE watermark: synthetic surface calibrated data

[broker]
# TWS/IBG paper account — port 7496 = paper, 7497 = live (see IBKR Gateway settings)
host      = "127.0.0.1"
port      = 7496        # TWS live socket (7496=live, 7497=paper)
client_id = 12          # must be unique per connected client (change if conflict)

[ops]
log_dir          = "logs"
log_rotation_days = 7   # days before log files are rotated/archived

[ops.kill_switch]
# Touch this file to trigger immediate system halt (monitoring loop checks every cycle)
manual_trigger_file = "ops/kill_switch.trigger"

[secrets]
# List env-var names that must be set before the system can start in this profile.
# Empty in dev (no external credentials required).
required_env = []

[tier]
# capital_tier = ceiling of available strategies (determined by deposited capital)
# active_mode  = currently selected operating mode (must be <= capital_tier)
capital_tier = "MICRO"
active_mode  = "MICRO"

[sessions]
# Sessioni automatiche morning + EOD — DISABILITATO in dev (nessun dato reale)
enabled          = false
morning_time     = "09:00"           # orario locale EST (America/New_York)
eod_time         = "16:30"           # orario locale EST
timezone         = "America/New_York"
duration_max_min = 10                # timeout massimo per sessione (minuti)
skip_weekends    = true
skip_holidays    = true              # calendario NYSE
profile          = "dev"
api_base         = "http://localhost:8765"
