upstream qopz_api {
    server api:8765;
}

server {
    listen 80;

    auth_basic "QOpz.AI";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Guida MkDocs — file statici
    location /guide {
        alias /usr/share/nginx/guide;
        index index.html;
        try_files $uri $uri/ /guide/index.html;
    }

    # Tutto il resto → FastAPI
    location / {
        proxy_pass http://qopz_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
